<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아파트 매매 자금 & 흐름 플래너</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --secondary-color: #e74c3c;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --border-color: #dfe6e9;
        }
        body {
            font-family: 'Pretendard', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { margin: 0; color: var(--text-color); font-size: 1.8rem; }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #7f8c8d; }
        .stat-card .amount { font-size: 1.6rem; font-weight: 800; }
        .amount.expense { color: var(--secondary-color); }
        .amount.asset { color: var(--primary-color); }
        .amount.deficit { color: #d63031; }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
        
        .panel { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .panel h2 { margin-top: 0; font-size: 1.2rem; margin-bottom: 15px; }
        .asset-title { color: var(--primary-color); }
        .expense-title { color: var(--secondary-color); }

        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 0.85rem; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border-color); text-align: left; }
        th { background: #f8f9fa; color: #7f8c8d; font-size: 0.75rem; }
        
        input { width: 100%; padding: 6px; border: 1px solid #eee; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 0.85rem; }
        input:focus { outline: none; border-color: var(--accent-color); background: #f0f7ff; }

        .btn-add { background: #f1f3f5; color: #495057; border: none; padding: 8px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-del { background: none; border: none; color: #ced4da; cursor: pointer; }
        .btn-del:hover { color: var(--secondary-color); }

        /* 타임라인 시각화 섹션 */
        .timeline-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }
        .timeline-container {
            display: flex;
            overflow-x: auto;
            padding: 20px 0;
            gap: 15px;
            min-height: 200px;
            align-items: flex-end;
        }
        .timeline-item {
            min-width: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .timeline-bar {
            width: 40px;
            background: #eee;
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: 0.3s;
        }
        .timeline-bar.asset { background-color: var(--primary-color); opacity: 0.7; }
        .timeline-bar.expense { background-color: var(--secondary-color); opacity: 0.7; }
        
        .timeline-label {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 10px;
            white-space: nowrap;
            font-weight: bold;
        }
        .timeline-date { font-size: 0.65rem; color: #999; }
        .timeline-value {
            position: absolute;
            top: -20px;
            font-size: 0.7rem;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }

        .save-bar { position: sticky; bottom: 20px; text-align: center; z-index: 100; }
        .btn-save { background: var(--text-color); color: white; border: none; padding: 12px 50px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
    <!-- Firebase SDK (v9 Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 아파트 매매 자금 & 흐름 플래너</h1>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <h3>총 지출 (필요 자금)</h3>
                <div class="amount expense" id="totalExpenseDisplay">0</div>
            </div>
            <div class="stat-card">
                <h3>총 수입 (보유 자산)</h3>
                <div class="amount asset" id="totalAssetDisplay">0</div>
            </div>
            <div class="stat-card">
                <h3 id="balanceLabel">자금 과부족</h3>
                <div class="amount" id="balanceDisplay">0</div>
            </div>
        </div>

        <!-- 타임라인 시각화 -->
        <div class="timeline-section">
            <h2>📅 자금 흐름 타임라인 (입출금 스케줄)</h2>
            <div class="timeline-container" id="timelineChart">
                <!-- JS에서 생성 -->
            </div>
            <p style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 10px;">
                * 날짜순으로 정렬되어 자금이 들어오고 나가는 시점을 보여줍니다.
            </p>
        </div>

        <div class="main-content">
            <!-- 수입/자산 입력 -->
            <div class="panel">
                <h2 class="asset-title">💰 자산/수입 스케줄</h2>
                <table id="assetTable">
                    <thead>
                        <tr>
                            <th width="100">날짜</th>
                            <th>항목</th>
                            <th width="100">금액(만)</th>
                            <th width="30"></th>
                        </tr>
                    </thead>
                    <tbody id="assetBody"></tbody>
                </table>
                <button class="btn-add" onclick="addRow('asset')">+ 수입 항목 추가</button>
            </div>

            <!-- 지출/비용 입력 -->
            <div class="panel">
                <h2 class="expense-title">💸 지출/비용 스케줄</h2>
                <table id="expenseTable">
                    <thead>
                        <tr>
                            <th width="100">날짜</th>
                            <th>항목</th>
                            <th width="100">금액(만)</th>
                            <th width="30"></th>
                        </tr>
                    </thead>
                    <tbody id="expenseBody"></tbody>
                </table>
                <button class="btn-add" onclick="addRow('expense')">+ 지출 항목 추가</button>
            </div>
        </div>

        <div class="save-bar">
            <button class="btn-save" onclick="saveData()">데이터 저장 및 동기화</button>
        </div>
    </div>

    <script>
        // Firebase 설정 및 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyBRGQpQfS8kFpSgJprljD27ng2_ifcUBL4",
            authDomain: "apartment-budget-planner.firebaseapp.com",
            projectId: "apartment-budget-planner",
            storageBucket: "apartment-budget-planner.firebasestorage.app",
            messagingSenderId: "350856974954",
            appId: "1:350856974954:web:e44402251d07d5c1c9f013",
            // 아시아 및 기타 리전일 가능성을 고려하여 기본 databaseURL 자동 매핑
            databaseURL: "https://apartment-budget-planner-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let assets = [
            { date: "2026-06-01", name: "현재 예금", amount: 5000 },
            { date: "2026-08-15", name: "적금 만기", amount: 2000 },
            { date: "2026-09-20", name: "주식 매도", amount: 1500 },
            { date: "2026-09-25", name: "주담대 실행", amount: 30000 }
        ];

        let expenses = [
            { date: "2026-06-10", name: "계약금", amount: 5000 },
            { date: "2026-08-20", name: "중도금", amount: 10000 },
            { date: "2026-09-25", name: "잔금 납부", amount: 35000 },
            { date: "2026-09-25", name: "취득세 등", amount: 1500 },
            { date: "2026-10-05", name: "인테리어비", amount: 3000 }
        ];

        function init() {
            // 1. 로컬 브라우저 백업 데이터 선 로드
            const saved = localStorage.getItem('real_estate_v5_flow');
            if (saved) {
                const data = JSON.parse(saved);
                assets = data.assets || [];
                expenses = data.expenses || [];
            }
            renderAll();

            // 2. Firebase 실시간 리스너 연결 (서버 데이터 실시간 자동 수신)
            db.ref('budget').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    assets = data.assets || [];
                    expenses = data.expenses || [];
                    renderAll();
                }
            }, (error) => {
                console.error("Firebase 실시간 연결 실패 (규칙 설정 확인 필요):", error);
            });
        }

        function renderAll() {
            renderTable('asset');
            renderTable('expense');
            calculate();
            renderTimeline();
        }

        function renderTable(type) {
            const body = document.getElementById(`${type}Body`);
            const data = type === 'asset' ? assets : expenses;
            body.innerHTML = '';
            data.forEach((item, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="date" value="${item.date}" oninput="updateData('${type}', ${i}, 'date', this.value)"></td>
                    <td><input type="text" value="${item.name}" oninput="updateData('${type}', ${i}, 'name', this.value)"></td>
                    <td><input type="number" value="${item.amount}" oninput="updateData('${type}', ${i}, 'amount', this.value)"></td>
                    <td><button class="btn-del" onclick="deleteRow('${type}', ${i})">&times;</button></td>
                `;
                body.appendChild(row);
            });
        }

        function updateData(type, index, field, value) {
            const data = type === 'asset' ? assets : expenses;
            if (field === 'amount') data[index][field] = parseFloat(value) || 0;
            else data[index][field] = value;
            calculate();
            renderTimeline();
        }

        function addRow(type) {
            const data = type === 'asset' ? assets : expenses;
            data.push({ date: "", name: "새 항목", amount: 0 });
            renderTable(type);
        }

        function deleteRow(type, index) {
            const data = type === 'asset' ? assets : expenses;
            data.splice(index, 1);
            renderAll();
        }

        function calculate() {
            const totalAsset = assets.reduce((sum, item) => sum + item.amount, 0);
            const totalExpense = expenses.reduce((sum, item) => sum + item.amount, 0);
            const balance = totalAsset - totalExpense;

            document.getElementById('totalAssetDisplay').textContent = formatWon(totalAsset);
            document.getElementById('totalExpenseDisplay').textContent = formatWon(totalExpense);
            const disp = document.getElementById('balanceDisplay');
            const lbl = document.getElementById('balanceLabel');
            disp.textContent = formatWon(Math.abs(balance));
            if (balance >= 0) { lbl.textContent = "여유 자금"; disp.className = "amount asset"; }
            else { lbl.textContent = "부족 자금"; disp.className = "amount deficit"; }
        }

        function renderTimeline() {
            const chart = document.getElementById('timelineChart');
            chart.innerHTML = '';
            
            // 모든 데이터를 합쳐서 날짜순 정렬
            const all = [
                ...assets.map(a => ({...a, type: 'asset'})),
                ...expenses.map(e => ({...e, type: 'expense'}))
            ].filter(d => d.date).sort((a, b) => new Date(a.date) - new Date(b.date));

            if (all.length === 0) return;

            const maxAmount = Math.max(...all.map(d => d.amount));

            all.forEach(item => {
                const height = (item.amount / maxAmount) * 150 + 20;
                const wrapper = document.createElement('div');
                wrapper.className = 'timeline-item';
                
                const bar = document.createElement('div');
                bar.className = `timeline-bar ${item.type}`;
                bar.style.height = `${height}px`;
                
                const val = document.createElement('div');
                val.className = 'timeline-value';
                val.textContent = (item.amount >= 10000 ? (item.amount/10000).toFixed(1) + '억' : item.amount + '만');

                const label = document.createElement('div');
                label.className = 'timeline-label';
                label.innerHTML = `${item.name}<br><span class="timeline-date">${item.date.substring(5)}</span>`;

                bar.appendChild(val);
                wrapper.appendChild(bar);
                wrapper.appendChild(label);
                chart.appendChild(wrapper);
            });
        }

        function formatWon(val) {
            if (val >= 10000) {
                const eok = Math.floor(val / 10000);
                const man = val % 10000;
                return man === 0 ? `${eok}억 원` : `${eok}억 ${man.toLocaleString()}만 원`;
            }
            return `${val.toLocaleString()}만 원`;
        }

        function saveData() {
            // 로컬 브라우저 백업용 저장
            localStorage.setItem('real_estate_v5_flow', JSON.stringify({ assets, expenses }));
            
            // Firebase 서버에 저장 (실시간 동기화)
            db.ref('budget').set({ assets, expenses })
                .then(() => {
                    alert('자금 흐름 계획이 성공적으로 서버에 저장 및 실시간 동기화되었습니다!');
                })
                .catch((error) => {
                    console.error("Firebase 저장 에러:", error);
                    alert('서버 저장 실패: ' + error.message + '\n\n* Firebase Realtime Database의 규칙(Rules)이 "테스트 모드"(.read: true, .write: true)로 설정되어 있는지 확인해 주세요.');
                });
        }

        window.onload = init;
    </script>
</body>
</html>
